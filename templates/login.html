<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if mode == 'register' %}注册{% else %}登录{% endif %} - AI电商视觉智能工作台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .auth-card { width: min(420px, 100%); background: rgba(255,255,255,.95); border: 1px solid #dbe7f6; border-radius: 16px; padding: 22px; box-shadow: 0 20px 40px rgba(0,0,0,.12); }
    .auth-title { margin: 0 0 12px; font-size: 24px; }
    .auth-row { display: grid; gap: 10px; margin-bottom: 12px; }
    .auth-foot { color: #5b6f86; font-size: 13px; }
    .auth-foot a { color: #1d5bb2; text-decoration: none; }
    .auth-error { margin: 0 0 12px; padding: 10px 12px; border: 1px solid #f6c6c6; background: #fff1f1; color: #b42318; border-radius: 10px; font-size: 13px; }
    .auth-info { margin: 0 0 12px; padding: 10px 12px; border: 1px solid #b6ddc2; background: #edf9f1; color: #1c6b3c; border-radius: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" method="post" action="{% if mode == 'register' %}/auth/register{% else %}/auth/login{% endif %}">
      <h1 class="auth-title">{% if mode == 'register' %}用户注册{% else %}用户登录{% endif %}</h1>
      {% if info %}
      <div class="auth-info">{{ info }}</div>
      {% endif %}
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <div class="auth-row">
        <input name="username" placeholder="用户名（字母数字._-）" value="{{ username_prefill or '' }}" required />
        {% if mode == 'register' %}
        <input name="email" type="email" placeholder="邮箱（用于找回密码）" value="{{ email_prefill or '' }}" required />
        {% endif %}
        <input name="password" type="password" placeholder="密码（至少6位）" required />
      </div>
      <div class="auth-row">
        <button class="btn primary" type="submit">{% if mode == 'register' %}注册并进入{% else %}登录进入{% endif %}</button>
      </div>
      <div class="auth-foot">
        {% if mode == 'register' %}
          已有账号？<a href="/login">去登录</a>
        {% else %}
          没有账号？<a href="/register">去注册</a>
        {% endif %}
      </div>
    </form>
  </div>
</body>
</html>
