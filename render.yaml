services:
  - type: web
    name: pdd-ai-visual-workbench
    runtime: python
    plan: free
    rootDir: pdd
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /auth/login
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
